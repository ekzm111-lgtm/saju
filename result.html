<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사주 리포트 | Memory Fortune AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #FFD700 100%);
            --deep-bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(212, 175, 55, 0.3);
        }
        
        body { background: var(--deep-bg); color: var(--text-ivory); font-family: 'Noto Sans KR', sans-serif; padding-bottom: 100px; }
        .report-container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* 헤더 섹션 */
        .report-header { text-align: center; margin-bottom: 60px; padding-top: 50px; }
        .report-header h1 { font-family: 'Noto Serif KR', serif; font-size: 2.5rem; margin-bottom: 15px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .report-meta { opacity: 0.6; font-size: 0.9rem; letter-spacing: 1px; }

        /* 카드 공통 스타일 */
        .report-card { background: var(--card-bg); border: 1px solid var(--border-gold); padding: 40px; border-radius: 4px; margin-bottom: 40px; position: relative; overflow: hidden; }
        .report-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold-gradient); }
        
        .card-title { font-family: 'Noto Serif KR', serif; font-size: 1.5rem; color: var(--gold); margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }
        .card-title i { font-size: 1.2rem; }

        /* 인사말 섹션 */
        .intro-text { line-height: 1.8; font-size: 1.1rem; word-break: keep-all; }

        /* 핵심 요약 */
        .summary-box { display: flex; flex-direction: column; gap: 20px; }
        .summary-idiom { font-size: 2rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 10px; }
        .summary-meaning { text-align: center; font-style: italic; opacity: 0.8; margin-bottom: 30px; }
        .strength-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .strength-item { background: rgba(255,215,0,0.05); border: 1px border var(--border-gold); padding: 15px; text-align: center; border-radius: 4px; border: 1px solid var(--border-gold); }

        /* 월별 운세 */
        .month-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .month-item { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .month-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .month-num { font-weight: 700; color: var(--gold); }
        .month-star { color: #FFD700; }
        .month-kw { font-weight: 500; margin-bottom: 8px; font-size: 0.95rem; }
        .month-adv { font-size: 0.85rem; opacity: 0.7; line-height: 1.5; }

        /* 행운 요소 */
        .lucky-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .lucky-item { text-align: center; font-size: 0.85rem; }
        .lucky-icon { font-size: 1.5rem; margin-bottom: 10px; color: var(--gold); }
        .lucky-val { font-weight: 700; }

        @media (max-width: 600px) {
            .lucky-grid { grid-template-columns: repeat(3, 1fr); }
            .report-header h1 { font-size: 1.8rem; }
            .report-card { padding: 30px 20px; }
        }

        .btn-print { position: fixed; bottom: 30px; right: 30px; background: var(--gold-gradient); color: #000; border: none; padding: 15px 25px; border-radius: 50px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; gap: 10px; z-index: 100; }
    </style>
</head>
<body>
    <div id="star-background"></div>

    <div class="report-container" id="report-content" style="display: none;">
        <header class="report-header">
            <div class="report-meta">MEMORY FORTUNE AI PREMIUM REPORT</div>
            <h1 id="report-title">사용자님만을 위한 사주 리포트</h1>
            <p id="report-date"></p>
        </header>

        <!-- 1. 인사말 -->
        <section class="report-card">
            <h2 class="card-title"><i class="fa-solid fa-feather-pointed"></i> 하늘의 흐름을 읽는 지혜</h2>
            <div id="intro-content" class="intro-text"></div>
        </section>

        <!-- 2. 핵심 요약 -->
        <section class="report-card">
            <h2 class="card-title"><i class="fa-solid fa-crown"></i> 당신의 타고난 기운</h2>
            <div class="summary-box">
                <div id="summary-idiom" class="summary-idiom"></div>
                <div id="summary-meaning" class="summary-meaning"></div>
                <div id="strength-list" class="strength-grid"></div>
            </div>
        </section>

        <!-- 3. 연간 운세 -->
        <section class="report-card">
            <h2 class="card-title"><i class="fa-solid fa-calendar-check"></i> 2026년 대운의 흐름</h2>
            <div id="yearly-kw" style="display: flex; gap: 10px; margin-bottom: 20px;"></div>
            <div id="yearly-desc" class="intro-text"></div>
        </section>

        <!-- 4. 분야별 분석 -->
        <section class="report-card">
            <h2 class="card-title"><i class="fa-solid fa-chart-line"></i> 분야별 심층 가이드</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div>
                    <h4 style="color: var(--gold); margin-bottom: 10px;"><i class="fa-solid fa-coins"></i> 재물 및 직업</h4>
                    <p id="ana-work" style="font-size: 0.9rem; line-height: 1.6; opacity: 0.8;"></p>
                </div>
                <div>
                    <h4 style="color: var(--gold); margin-bottom: 10px;"><i class="fa-solid fa-heart"></i> 애정 및 인연</h4>
                    <p id="ana-love" style="font-size: 0.9rem; line-height: 1.6; opacity: 0.8;"></p>
                </div>
                <div>
                    <h4 style="color: var(--gold); margin-bottom: 10px;"><i class="fa-solid fa-shield-heart"></i> 건강 대책</h4>
                    <p id="ana-health" style="font-size: 0.9rem; line-height: 1.6; opacity: 0.8;"></p>
                </div>
                <div>
                    <h4 style="color: var(--gold); margin-bottom: 10px;"><i class="fa-solid fa-users"></i> 대인관계</h4>
                    <p id="ana-social" style="font-size: 0.9rem; line-height: 1.6; opacity: 0.8;"></p>
                </div>
            </div>
        </section>

        <!-- 5. 월별 상세 운세 -->
        <section class="report-card">
            <h2 class="card-title"><i class="fa-solid fa-timeline"></i> 월별 상세 운세 일지</h2>
            <div id="month-list" class="month-grid"></div>
        </section>

        <!-- 6. 행운 아이템 -->
        <section class="report-card">
            <h2 class="card-title"><i class="fa-solid fa-sparkles"></i> 당신을 돕는 행운의 기운</h2>
            <div id="lucky-items" class="lucky-grid"></div>
        </section>

        <!-- 7. 마무리 -->
        <section class="report-card" style="border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.05);">
            <i class="fa-solid fa-quote-left" style="font-size: 2rem; color: var(--gold); opacity: 0.3;"></i>
            <div id="closing-text" class="intro-text" style="padding: 0 20px; text-align: center; font-weight: 500;"></div>
            <div style="text-align: right; margin-top: 20px; opacity: 0.5;">- Memory Fortune AI 조언 -</div>
        </section>

        <button class="btn-print" onclick="window.print()">
            <i class="fa-solid fa-file-pdf"></i> 리포트 인쇄 / PDF 저장
        </button>
    </div>

    <div id="error-screen" style="display: none; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;">
        <i class="fa-solid fa-circle-exclamation" style="font-size: 4rem; color: var(--gold); margin-bottom: 20px;"></i>
        <h2>리포트를 찾을 수 없습니다.</h2>
        <p style="opacity: 0.6; margin: 15px 0 30px;">분석이 완료된 결과가 없거나 세션이 만료되었습니다.</p>
        <button class="btn btn-gold-solid" onclick="location.href='index.html'">메인으로 돌아가기</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resultData = JSON.parse(localStorage.getItem('lastFortuneResult'));
            const userInfo = JSON.parse(localStorage.getItem('lastUserInfo'));

            if (!resultData || !userInfo) {
                document.getElementById('error-screen').style.display = 'flex';
                document.getElementById('report-content').style.display = 'none';
                return;
            }

            document.getElementById('report-content').style.display = 'block';
            document.getElementById('report-date').innerText = new Date().toLocaleDateString() + " | " + userInfo.name + "님 분석 리포트";

            // 데이터 입히기
            document.getElementById('report-title').innerText = resultData.인사말.제목;
            document.getElementById('intro-content').innerText = resultData.인사말.내용;
            
            document.getElementById('summary-idiom').innerText = resultData.핵심요약.사자성어;
            document.getElementById('summary-meaning').innerText = resultData.핵심요약.해석;
            document.getElementById('strength-list').innerHTML = resultData.핵심요약.강점.map(s => `<div class="strength-item">${s}</div>`).join('');

            document.getElementById('yearly-kw').innerHTML = resultData.연간운세.키워드.map(k => `<span class="badge" style="background: var(--gold-soft); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;"># ${k}</span>`).join('');
            document.getElementById('yearly-desc').innerText = resultData.연간운세.상세설명;

            document.getElementById('ana-work').innerText = resultData.심층분석.재물직업;
            document.getElementById('ana-love').innerText = resultData.심층분석.애정결혼;
            document.getElementById('ana-health').innerText = resultData.심층분석.건강운;
            document.getElementById('ana-social').innerText = resultData.심층분석.대인관계;

            document.getElementById('month-list').innerHTML = resultData.월별운세.map(m => `
                <div class="month-item">
                    <div class="month-head">
                        <span class="month-num">${m.월}</span>
                        <span class="month-star">${m.점수}</span>
                    </div>
                    <div class="month-kw">${m.키워드}</div>
                    <div class="month-adv">${m.조언}</div>
                </div>
            `).join('');

            const lucky = resultData.행운아이템;
            document.getElementById('lucky-items').innerHTML = `
                <div class="lucky-item"><div class="lucky-icon"><i class="fa-solid fa-palette"></i></div><div class="lucky-val">${lucky.색상}</div><div style="font-size: 0.7rem; opacity: 0.5;">색상</div></div>
                <div class="lucky-item"><div class="lucky-icon"><i class="fa-solid fa-hashtag"></i></div><div class="lucky-val">${lucky.숫자}</div><div style="font-size: 0.7rem; opacity: 0.5;">숫자</div></div>
                <div class="lucky-item"><div class="lucky-icon"><i class="fa-solid fa-compass"></i></div><div class="lucky-val">${lucky.방향}</div><div style="font-size: 0.7rem; opacity: 0.5;">방향</div></div>
                <div class="lucky-item"><div class="lucky-icon"><i class="fa-solid fa-utensils"></i></div><div class="lucky-val">${lucky.음식}</div><div style="font-size: 0.7rem; opacity: 0.5;">음식</div></div>
                <div class="lucky-item"><div class="lucky-icon"><i class="fa-solid fa-leaf"></i></div><div class="lucky-val">${lucky.꽃}</div><div style="font-size: 0.7rem; opacity: 0.5;">꽃</div></div>
            `;

            document.getElementById('closing-text').innerText = resultData.마무리;
        });
    </script>
</body>
</html>
