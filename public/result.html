<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결과 리포트 | Memory Fortune AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --gold-gradient: linear-gradient(135deg, #ffd700 0%, #b8860b 50%, #ffd700 100%);
      --deep-bg: #05070a;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-gold: rgba(212, 175, 55, 0.3);
    }
    body { background: var(--deep-bg); color: var(--text-ivory); font-family: "Noto Sans KR", sans-serif; padding-bottom: 90px; }
    .report-container { max-width: 980px; margin: 0 auto; padding: 40px 20px; }
    .report-header { text-align: center; margin-bottom: 36px; padding-top: 42px; }
    .report-meta { opacity: 0.65; font-size: 0.88rem; letter-spacing: 1px; }
    .report-header h1 { font-family: "Noto Serif KR", serif; font-size: 2.4rem; margin: 12px 0; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .report-sub { opacity: 0.8; }
    .link-notice { border: 1px solid var(--border-gold); background: var(--card-bg); padding: 14px 16px; border-radius: 4px; margin: 0 auto 28px; max-width: 760px; text-align: center; color: var(--gold); }
    .report-card { background: var(--card-bg); border: 1px solid var(--border-gold); padding: 30px; border-radius: 4px; margin-bottom: 22px; }
    .card-title { font-family: "Noto Serif KR", serif; font-size: 1.35rem; color: var(--gold); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    .card-text { line-height: 1.75; font-size: 1rem; word-break: keep-all; }
    .kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .kv-item { background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.06); padding: 12px; }
    .kv-key { color: var(--gold); font-size: 0.9rem; margin-bottom: 6px; }
    .kv-val { font-size: 0.98rem; opacity: 0.95; }
    .month-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
    .month-item { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.06); padding: 10px; }
    .month-item b { color: var(--gold); display: block; margin-bottom: 4px; }
    .name-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .name-item { text-align: center; border: 1px solid var(--border-gold); background: rgba(201, 168, 76, 0.08); padding: 10px 12px; }
    .action-row { margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-action { border: 1px solid var(--gold); background: transparent; color: var(--gold); padding: 12px 24px; font-weight: 700; cursor: pointer; }
    .btn-action.primary { background: var(--gold); color: #000; }
    #error-screen { display: none; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    @media (max-width: 720px) {
      .report-container { padding: 20px 15px; }
      .report-header { padding-top: 20px; margin-bottom: 24px; }
      .report-meta { font-size: 0.76rem; letter-spacing: 0.06em; }
      .report-header h1 { font-size: 1.42rem; line-height: 1.38; }
      .report-sub { font-size: 0.92rem; }
      .link-notice { font-size: 0.92rem; line-height: 1.6; padding: 12px 14px; }
      .report-card { padding: 20px 15px; }
      .card-title { font-size: 1.02rem; }
      .card-text { font-size: 0.92rem; line-height: 1.72; }
      .kv-key { font-size: 0.82rem; }
      .kv-val { font-size: 0.9rem; }
      .kv-grid { grid-template-columns: 1fr; gap: 10px; }
      .month-grid { grid-template-columns: 1fr; }
      .name-list { grid-template-columns: 1fr; }
      .action-row { gap: 8px; }
      .btn-action { width: 100%; padding: 14px; font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <div id="star-background"></div>

  <div class="report-container" id="report-content" style="display:none;">
    <header class="report-header">
      <div class="report-meta">MEMORY FORTUNE AI REPORT</div>
      <h1 id="report-title"></h1>
      <p class="report-sub" id="report-date"></p>
    </header>

    <p class="link-notice">이 페이지 링크를 저장하면 언제든 다시 볼 수 있어요</p>
    <div id="service-sections"></div>

    <div class="action-row">
      <button class="btn-action primary" id="btn-pdf"><i class="fa-solid fa-file-pdf"></i> PDF 저장</button>
      <button class="btn-action" id="btn-refresh"><i class="fa-solid fa-rotate-right"></i> 다시 보기</button>
      <button class="btn-action" id="btn-home" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);"><i class="fa-solid fa-house"></i> 나가기</button>
    </div>
  </div>

  <div id="error-screen">
    <i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; color: var(--gold); margin-bottom: 16px;"></i>
    <h2>리포트를 찾을 수 없습니다.</h2>
    <p style="opacity: 0.7; margin: 12px 0 26px;">결과 링크를 확인해 주세요.</p>
    <button class="btn-action primary" onclick="location.href='index.html'">메인으로 돌아가기</button>
  </div>

  <script>
    const SUPABASE_URL = "https://kmrigsfjsdsfzpugtfnq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_5how-klMccwuZ5zqic_7Xw_LLkSAy6K";

    function parseJSON(raw) {
      if (!raw) return null;
      if (typeof raw === "object") return raw;
      try { return JSON.parse(raw); } catch (_) { return null; }
    }

    function formatDate() {
      return new Date().toLocaleDateString("ko-KR");
    }

    function makeCard(title, bodyHtml, icon = "fa-star") {
      return `
        <section class="report-card">
          <h2 class="card-title"><i class="fa-solid ${icon}"></i> ${title}</h2>
          <div class="card-text">${bodyHtml}</div>
        </section>
      `;
    }

    function getLuckyInfo(result) {
      const lucky = result.행운정보 || {};
      return {
        color: lucky.색상 || lucky.행운의색 || result.행운의색 || result.행운색상 || "",
        number: lucky.숫자 || lucky.행운의숫자 || result.행운의숫자 || result.행운숫자 || "",
        direction: lucky.방향 || lucky.행운의방향 || result.행운의방향 || result.행운방향 || ""
      };
    }

    function formatCardValue(value) {
      if (value == null) return "";
      if (typeof value === "string" || typeof value === "number") return String(value);
      if (Array.isArray(value)) {
        return value
          .map((item) => formatCardValue(item))
          .filter(Boolean)
          .join("<br>");
      }
      if (typeof value === "object") {
        return Object.entries(value)
          .map(([key, item]) => {
            const formatted = formatCardValue(item);
            return formatted ? `<div><b>${key}</b> ${formatted}</div>` : "";
          })
          .filter(Boolean)
          .join("");
      }
      return String(value);
    }

    function renderBasic(result) {
      const lucky = getLuckyInfo(result);
      return [
        makeCard("총평", formatCardValue(result.총평), "fa-feather-pointed"),
        makeCard("오늘의 운세", formatCardValue(result.오늘의운세), "fa-sun"),
        makeCard("이번 달 운세", formatCardValue(result.이번달운세), "fa-calendar-days"),
        makeCard("행운 정보", `
          <div class="kv-grid">
            <div class="kv-item"><div class="kv-key">행운 색상</div><div class="kv-val">${lucky.color}</div></div>
            <div class="kv-item"><div class="kv-key">행운 숫자</div><div class="kv-val">${lucky.number}</div></div>
            <div class="kv-item"><div class="kv-key">행운 방향</div><div class="kv-val">${lucky.direction}</div></div>
          </div>
        `, "fa-clover")
      ].join("");
    }

    function renderPremium(result) {
      const five = result.오행분석 || {};
      const months = Array.isArray(result.월별운세) ? result.월별운세 : [];
      const lucky = getLuckyInfo(result);
      return [
        makeCard("총평", formatCardValue(result.총평), "fa-feather-pointed"),
        makeCard("오행 분석", `
          <div class="kv-grid">
            <div class="kv-item"><div class="kv-key">목</div><div class="kv-val">${five.목 || ""}</div></div>
            <div class="kv-item"><div class="kv-key">화</div><div class="kv-val">${five.화 || ""}</div></div>
            <div class="kv-item"><div class="kv-key">토</div><div class="kv-val">${five.토 || ""}</div></div>
            <div class="kv-item"><div class="kv-key">금</div><div class="kv-val">${five.금 || ""}</div></div>
            <div class="kv-item"><div class="kv-key">수</div><div class="kv-val">${five.수 || ""}</div></div>
          </div>
        `, "fa-yin-yang"),
        makeCard("2026년 운세", formatCardValue(result["2026년운세"]), "fa-calendar-check"),
        makeCard("월별 운세", `
          <div class="month-grid">
            ${months.map((m) => `<div class="month-item"><b>${m.월 || ""}</b><div>${m.운세 || ""}</div></div>`).join("")}
          </div>
        `, "fa-chart-line"),
        makeCard("분야별 운세", `
          <div class="kv-grid">
            <div class="kv-item"><div class="kv-key">재물운</div><div class="kv-val">${formatCardValue(result.재물운)}</div></div>
            <div class="kv-item"><div class="kv-key">애정운</div><div class="kv-val">${formatCardValue(result.애정운)}</div></div>
            <div class="kv-item"><div class="kv-key">건강운</div><div class="kv-val">${formatCardValue(result.건강운)}</div></div>
          </div>
        `, "fa-briefcase"),
        makeCard("행운 정보", `
          <div class="kv-grid">
            <div class="kv-item"><div class="kv-key">행운 색상</div><div class="kv-val">${lucky.color}</div></div>
            <div class="kv-item"><div class="kv-key">행운 숫자</div><div class="kv-val">${lucky.number}</div></div>
            <div class="kv-item"><div class="kv-key">행운 방향</div><div class="kv-val">${lucky.direction}</div></div>
          </div>
        `, "fa-clover"),
        makeCard("총 조언", formatCardValue(result.총조언), "fa-quote-left")
      ].join("");
    }

    function renderCouple(result) {
      return [
        makeCard("궁합 점수", `<div style="font-size:2rem;color:var(--gold);font-weight:700;">${result.궁합점수 || 0}점</div>`, "fa-heart"),
        makeCard("궁합 총평", result.궁합총평 || "", "fa-feather-pointed"),
        makeCard("연애운", result.연애운 || "", "fa-heart-circle-check"),
        makeCard("결혼운", result.결혼운 || "", "fa-ring"),
        makeCard("갈등 포인트", result.갈등포인트 || "", "fa-triangle-exclamation"),
        makeCard("극복 방법", result.극복방법 || "", "fa-handshake"),
        makeCard("최고의 순간", result.최고의순간 || "", "fa-star")
      ].join("");
    }

    function renderName(result) {
      const names = Array.isArray(result.추천이름3개) ? result.추천이름3개 : [];
      return [
        makeCard("이름 분석", result.이름분석 || "", "fa-signature"),
        makeCard("이름의 기운", result.이름의기운 || "", "fa-bolt"),
        makeCard("오행 균형", result.오행균형 || "", "fa-yin-yang"),
        makeCard("이름이 주는 운세", result.이름이주는운세 || "", "fa-star"),
        makeCard("개명 추천 여부", result.개명추천여부 || "", "fa-scale-balanced"),
        makeCard("추천 이름 3개", `
          <div class="name-list">
            ${names.map((n) => `<div class="name-item">${n}</div>`).join("")}
          </div>
        `, "fa-lightbulb")
      ].join("");
    }

    function renderByService(serviceId, result) {
      if (serviceId === "premium") return renderPremium(result);
      if (serviceId === "couple") return renderCouple(result);
      if (serviceId === "name") return renderName(result);
      return renderBasic(result);
    }

    function showError() {
      document.getElementById("report-content").style.display = "none";
      document.getElementById("error-screen").style.display = "flex";
    }

    async function fetchResultById(id) {
      if (!window.supabase || !SUPABASE_URL || !SUPABASE_KEY) return null;
      const { createClient } = window.supabase;
      const client = createClient(SUPABASE_URL, SUPABASE_KEY);
      const { data, error } = await client
        .from("saju_results")
        .select("id, user_name, result_json, created_at")
        .eq("id", id)
        .single();

      if (error) {
        console.error("Supabase 결과 조회 실패:", error);
        return null;
      }
      return data;
    }

    function renderReport(payload, fallbackName) {
      const serviceName = payload?.serviceName || "사주분석";
      const serviceId = payload?.serviceId || "basic";
      const customerName = payload?.customerName || fallbackName || "고객";
      const result = payload?.result || {};

      document.getElementById("report-title").innerText = `✦ ${customerName}님의 ${serviceName} 결과`;
      document.getElementById("report-date").innerText = `${formatDate()} 생성 리포트`;
      document.getElementById("service-sections").innerHTML = renderByService(serviceId, result);
      document.getElementById("report-content").style.display = "block";
      document.getElementById("error-screen").style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const localUser = parseJSON(localStorage.getItem("lastUserInfo"));
      const localResult = parseJSON(localStorage.getItem("lastFortuneResult"));

      let payload = localResult;
      if (id) {
        const row = await fetchResultById(id);
        if (row?.result_json) {
          payload = parseJSON(row.result_json) || row.result_json;
          if (payload && !payload.customerName) {
            payload.customerName = row.user_name || localUser?.name || "고객";
          }
        }
      }

      if (!payload || !payload.result) {
        showError();
        return;
      }

      renderReport(payload, localUser?.name);

      document.getElementById("btn-pdf").addEventListener("click", () => window.print());
      document.getElementById("btn-refresh").addEventListener("click", () => location.reload());
      document.getElementById("btn-home").addEventListener("click", () => window.location.href = "index.html");
    });
  </script>
</body>
</html>
